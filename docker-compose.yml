name: chemistry-legacy

services:
  postgres:
    image: pgvector/pgvector:pg16@sha256:00ba258a66dac104fd5171074a0084462a64a1369d8513f3d0a634e2f24d15bc
    environment:
      POSTGRES_DB: chemistry_exam
      POSTGRES_USER: chemistry
      POSTGRES_PASSWORD: chemistry
    ports:
      - "${POSTGRES_HOST_BIND:-127.0.0.1}:${POSTGRES_HOST_PORT:-15432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemistry -d chemistry_exam"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    image: chemistry-legacy-backend:legacy
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      CHEMISTRY_APP_ENV: development
      DATA_BACKEND: postgres
      DATABASE_URL: postgresql+psycopg://chemistry:chemistry@postgres:5432/chemistry_exam
      RUN_DB_CHECK_ON_STARTUP: "false"
      MEDIA_ROOT: /app/data/media
      API_PUBLIC_BASE_URL: ${API_PUBLIC_BASE_URL:-http://127.0.0.1:18000}
      FRONTEND_ALLOWED_ORIGINS: ${FRONTEND_ALLOWED_ORIGINS:-http://127.0.0.1:15176,http://localhost:15176,http://127.0.0.1:15177,http://localhost:15177,http://127.0.0.1:5176,http://localhost:5176,http://127.0.0.1:5177,http://localhost:5177}
      STUDENT_PREVIEW_APP_BASE_URL: ${STUDENT_PREVIEW_APP_BASE_URL:-http://127.0.0.1:15176}
      STUDENT_PREVIEW_ALLOWED_ORIGINS: ${STUDENT_PREVIEW_ALLOWED_ORIGINS:-http://127.0.0.1:15176,http://localhost:15176}
      STUDENT_PREVIEW_TICKET_EXPIRE_MINUTES: "10"
      STUDENT_PREVIEW_SESSION_EXPIRE_MINUTES: "240"
      TUS_UPLOAD_DIR: tus
      TUS_PUBLIC_ENDPOINT: http://127.0.0.1:10980/files/
      VIDEO_LIBRARY_SEARCH_ENABLED: "false"
      VIDEO_LIBRARY_SEARCH_LOCAL_FALLBACK: "true"
    ports:
      - "${BACKEND_HOST_BIND:-127.0.0.1}:${BACKEND_HOST_PORT:-18000}:8000"
    volumes:
      - ./data/media:/app/data/media
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2).read()"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-student:
    image: chemistry-legacy-web-student:legacy
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-student
    environment:
      BACKEND_UPSTREAM: http://backend:8000
      FRAME_ANCESTORS: "'self'"
    ports:
      - "${WEB_STUDENT_HOST_BIND:-127.0.0.1}:${WEB_STUDENT_HOST_PORT:-15176}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

  web-teacher:
    image: chemistry-legacy-web-teacher:legacy
    build:
      context: .
      dockerfile: server/Dockerfile.frontend
      args:
        APP_DIR: apps/web-teacher
    environment:
      BACKEND_UPSTREAM: http://backend:8000
      FRAME_ANCESTORS: "'self'"
    ports:
      - "${WEB_TEACHER_HOST_BIND:-127.0.0.1}:${WEB_TEACHER_HOST_PORT:-15177}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres_data:
